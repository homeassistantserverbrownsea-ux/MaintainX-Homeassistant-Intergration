create_work_order:
  name: Create Work Order
  description: Automatically sends a work order task directly to your MaintainX suite.
  fields:
    title:
      name: Title
      description: The header title of the maintenance request.
      required: true
      example: "Water Pump Offline"
    description:
      name: Description
      description: Context notes generated by your automation state.
      required: false
      example: "The pressure valve recorded an overcurrent state."
